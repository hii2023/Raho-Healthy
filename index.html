<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d9488">
<title>Raho Healthy - by NOSH7</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+Gujarati:wght@400;500;600;700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fbf7ee;
    --primary: #0d9488;
    --primary-dark: #115e59;
    --primary-2: #16a34a;
    --primary-soft: #ccfbf1;
    --accent: #ea580c;
    --accent-soft: #ffedd5;
    --danger: #b91c1c;
    --danger-soft: #fee2e2;
    --info: #1d4ed8;
    --info-soft: #dbeafe;
    --calm: #6d28d9;
    --calm-soft: #ede9fe;
    --text: #111827;
    --muted: #6b7280;
    --border: #f1e8d4;
  }
  * { -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-y: none; }
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background:
      radial-gradient(1200px 600px at -10% -10%, #fff8e8 0%, transparent 50%),
      radial-gradient(900px 500px at 110% 10%, #ccfbf1aa 0%, transparent 55%),
      var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  body.lang-gu, body.lang-gu * { font-family: 'Noto Sans Gujarati', sans-serif !important; }
  body.lang-hn, body.lang-hn * { font-family: 'Noto Sans Devanagari', sans-serif !important; }

  /* Logo image styling */
  .logo-img {
    object-fit: contain;
    background: white;
    border-radius: 50%;
    box-shadow: 0 4px 12px -2px rgba(13,148,136,.25);
  }

  /* Page transitions */
  .screen { opacity: 1; transform: translateY(0); transition: opacity .28s ease, transform .28s ease; }
  .screen.leaving { opacity: 0; transform: translateY(-8px); pointer-events: none; }
  .screen.entering { opacity: 0; transform: translateY(12px); }

  /* Disease cards */
  .disease-card {
    transition: transform .25s cubic-bezier(.2,.7,.2,1), box-shadow .25s, background .25s;
    cursor: pointer;
    background: linear-gradient(180deg, #ffffff 0%, #fffdf6 100%);
  }
  .disease-card:active { transform: scale(.97); }
  .disease-card:hover { transform: translateY(-3px); box-shadow: 0 14px 30px -10px rgba(13,148,136,.18); }

  /* Pills */
  .pill-btn {
    transition: all .2s cubic-bezier(.2,.7,.2,1);
    cursor: pointer;
    user-select: none;
  }
  .pill-btn:active { transform: scale(.96); }
  .pill-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
    box-shadow: 0 6px 14px -4px rgba(13,148,136,.45);
  }
  .pill-btn.fade-out { opacity: .25; transform: scale(.98); }
  .pill-btn.fade-in-active { animation: pillPop .35s cubic-bezier(.2,.7,.2,1); }
  @keyframes pillPop {
    0% { transform: scale(.94); }
    50% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  /* Section cards */
  .section-card {
    border-radius: 20px;
    padding: 1.1rem 1.1rem 1rem;
    border: 1px solid rgba(0,0,0,.04);
  }
  .section-card .head { display: flex; align-items: center; gap: .65rem; margin-bottom: .65rem; }
  .section-card .head .badge {
    width: 38px; height: 38px; border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    font-size: 18px; color: white;
  }
  .item-row {
    display: flex; gap: .7rem; align-items: flex-start;
    padding: .55rem 0;
    border-bottom: 1px dashed rgba(0,0,0,.07);
    line-height: 1.5;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row .num {
    flex-shrink: 0; width: 24px; height: 24px; border-radius: 8px;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,.85);
    margin-top: 1px;
  }

  /* Description box */
  .what-is-box {
    background: linear-gradient(135deg, #f0fdfa, #ccfbf1);
    border: 1.5px solid #5eead4;
    border-radius: 18px;
    padding: 1rem 1.1rem;
  }
  .what-is-box .label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--primary-dark);
    margin-bottom: .35rem;
    display: flex; align-items: center; gap: 6px;
  }
  .what-is-box .text {
    font-size: 14px;
    line-height: 1.55;
    color: #134e4a;
    font-weight: 500;
  }

  /* Language dropdown */
  .lang-dropdown { position: relative; }
  .lang-trigger {
    background: #f0fdfa;
    border: 1.5px solid #5eead4;
    border-radius: 999px;
    padding: 6px 12px 6px 14px;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary-dark);
    display: flex; align-items: center; gap: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .lang-trigger:active { transform: scale(.96); }
  .lang-trigger:hover { background: #ccfbf1; }
  .lang-menu {
    position: absolute;
    top: calc(100% + 6px); right: 0;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    box-shadow: 0 16px 40px -8px rgba(0,0,0,.18);
    padding: 6px;
    min-width: 160px;
    z-index: 60;
    display: none;
    animation: menuIn .18s cubic-bezier(.2,.7,.2,1);
  }
  .lang-menu.open { display: block; }
  @keyframes menuIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .lang-menu button {
    width: 100%;
    text-align: left;
    padding: 9px 12px;
    border-radius: 9px;
    font-size: 14px;
    color: #111827;
    transition: background .15s;
    cursor: pointer;
  }
  .lang-menu button:hover { background: #f0fdfa; }
  .lang-menu button.active { background: var(--primary); color: white; font-weight: 700; }
  .lang-menu button.active:hover { background: var(--primary-dark); }

  /* Sticky bottom bar */
  .bottom-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: .75rem 1rem calc(.75rem + env(safe-area-inset-bottom));
    z-index: 50;
  }
  .btn-primary {
    background: linear-gradient(180deg, #14b8a6 0%, #0d9488 100%);
    color: white;
    border-radius: 14px;
    padding: .9rem 1rem;
    font-weight: 700;
    width: 100%;
    box-shadow: 0 10px 22px -8px rgba(13,148,136,.5);
    transition: transform .12s, box-shadow .2s, opacity .2s;
  }
  .btn-primary:disabled { background: #d1d5db; box-shadow: none; cursor: not-allowed; opacity: .8; }
  .btn-primary:active:not(:disabled) { transform: scale(.98); }
  .btn-secondary {
    background: white;
    color: #111827;
    border: 1.5px solid #e5e7eb;
    border-radius: 14px;
    padding: .85rem 1rem;
    font-weight: 600;
    width: 100%;
    transition: transform .12s, background .2s;
  }
  .btn-secondary:active { transform: scale(.98); background: #f9fafb; }

  /* Step indicator */
  .step-bar { display:flex; gap:6px; margin-bottom: 1rem; }
  .step-bar > div {
    height: 6px; flex: 1; border-radius: 99px; background: #e5e7eb;
    transition: background .3s;
  }
  .step-bar > div.done { background: var(--primary); }
  .step-bar > div.current { background: linear-gradient(90deg, var(--primary), #5eead4); }

  /* Question card pop */
  .qcard { animation: qIn .35s cubic-bezier(.2,.7,.2,1); }
  @keyframes qIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* Plan section enter staggered */
  .plan-section { animation: psIn .4s cubic-bezier(.2,.7,.2,1) backwards; }
  .plan-section:nth-child(1) { animation-delay: .05s; }
  .plan-section:nth-child(2) { animation-delay: .12s; }
  .plan-section:nth-child(3) { animation-delay: .19s; }
  .plan-section:nth-child(4) { animation-delay: .26s; }
  .plan-section:nth-child(5) { animation-delay: .33s; }
  @keyframes psIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* NOSH7 promo card */
  .nosh-cta {
    background:
      radial-gradient(800px 200px at 0% 0%, #fff5e1 0%, transparent 60%),
      linear-gradient(135deg, #f0fdfa, #ccfbf1);
    border: 1.5px solid #5eead4;
    border-radius: 22px;
    padding: 1.25rem;
  }

  /* Image card (offscreen) */
  #share-card {
    position: fixed; left: -9999px; top: 0; width: 1080px;
    background:
      radial-gradient(900px 400px at 0% 0%, #fff5e1 0%, transparent 60%),
      #ffffff;
    padding: 56px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  #share-card.lang-gu, #share-card.lang-gu * { font-family: 'Noto Sans Gujarati', sans-serif !important; }
  #share-card.lang-hn, #share-card.lang-hn * { font-family: 'Noto Sans Devanagari', sans-serif !important; }
  .sc-section { padding: 24px 28px; border-radius: 22px; margin-bottom: 16px; }
  .sc-section h3 { font-size: 30px; font-weight: 800; margin-bottom: 12px; display:flex; align-items:center; gap:10px; }
  .sc-section .ic { width:48px; height:48px; border-radius:14px; color:#fff; display:flex; align-items:center; justify-content:center; font-size:24px; }
  .sc-section ul { list-style: none; padding: 0; margin: 0; }
  .sc-section li { font-size: 22px; line-height: 1.5; padding: 6px 0 6px 26px; position: relative; }
  .sc-section li::before { content: '•'; position: absolute; left: 6px; font-weight: 800; }

  /* Description box for share card */
  .sc-what-is {
    background: linear-gradient(135deg, #f0fdfa, #ccfbf1);
    border: 2px solid #5eead4;
    border-radius: 22px;
    padding: 22px 26px;
    margin-bottom: 18px;
  }
  .sc-what-is .label {
    font-size: 16px; font-weight: 800; text-transform: uppercase;
    letter-spacing: .1em; color: #115e59; margin-bottom: 8px;
  }
  .sc-what-is .text { font-size: 22px; line-height: 1.5; color: #134e4a; font-weight: 600; }

  /* tiny chip */
  .chip {
    display: inline-flex; align-items:center; gap:6px;
    padding: 4px 10px; border-radius: 99px;
    font-size: 12px; font-weight: 600;
    background: #f0fdfa; color: var(--primary-dark);
    border: 1px solid #5eead4;
  }

  /* Make tap targets bigger on mobile */
  @media (max-width: 640px) {
    .pill-btn { padding: 10px 14px; font-size: 14px; }
    .item-row { padding: .6rem 0; }
  }
</style>
</head>

<main class="max-w-3xl mx-auto px-4 pt-5 pb-32">

  <!-- HOME -->
  <section id="screen-home" class="screen">
    <div class="text-center mb-6 mt-2">
      <span class="chip"><span>✨</span> <span data-i18n="chip"></span></span>
      <h1 class="text-[26px] sm:text-3xl font-extrabold text-teal-950 mt-3 leading-tight" data-i18n="heroTitle"></h1>
      <p class="text-gray-600 mt-2 max-w-xl mx-auto text-[15px]" data-i18n="heroSub"></p>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
  </section>

  <!-- QUESTIONS -->
  <section id="screen-questions" hidden class="screen">
    <button onclick="goHome()" class="text-sm text-gray-600 mb-3 flex items-center gap-1 active:scale-95 transition">
      <span>←</span> <span data-i18n="back"></span>
    </button>

    <div class="bg-white rounded-3xl p-5 shadow-sm border border-amber-100 qcard">
      <div class="flex items-center gap-3 mb-3">
        <div id="q-icon" class="text-3xl"></div>
        <div>
          <h2 id="q-disease" class="text-[19px] font-extrabold text-teal-950 leading-tight"></h2>
          <p class="text-xs text-gray-500 mt-0.5" data-i18n="qSub"></p>
        </div>
      </div>
      <div class="step-bar mt-2 mb-4" id="step-bar">
        <div class="current"></div><div></div><div></div>
      </div>

      <div class="mb-4">
        <label class="block font-semibold mb-2 text-[15px]" data-i18n="qAge"></label>
        <div id="q-age" class="flex flex-wrap gap-2"></div>
      </div>
      <div class="mb-4">
        <label class="block font-semibold mb-2 text-[15px]" data-i18n="qDuration"></label>
        <div id="q-duration" class="flex flex-wrap gap-2"></div>
      </div>
      <div class="mb-2">
        <label class="block font-semibold mb-2 text-[15px]" data-i18n="qActivity"></label>
        <div id="q-activity" class="flex flex-col gap-2"></div>
      </div>
    </div>
  </section>

  <!-- PLAN -->
  <section id="screen-plan" hidden class="screen">
    <button onclick="goHome()" class="text-sm text-gray-600 mb-3 flex items-center gap-1 active:scale-95 transition">
      <span>←</span> <span data-i18n="back"></span>
    </button>

    <div class="bg-white rounded-3xl p-5 shadow-sm border border-amber-100 mb-3">
      <div class="flex items-center gap-3">
        <div id="p-icon" class="text-4xl"></div>
        <div>
          <div class="text-[11px] uppercase tracking-wider font-bold text-teal-700" data-i18n="yourPlan"></div>
          <h2 id="p-disease" class="text-[20px] sm:text-[22px] font-extrabold text-teal-950 leading-tight"></h2>
        </div>
      </div>
      <div id="personal-note" class="mt-3 p-3 bg-amber-50 border border-amber-200 rounded-xl text-[13px] text-amber-900 space-y-1" hidden></div>
    </div>

    <!-- NEW: Description box -->
    <div class="what-is-box mb-3">
      <div class="label"><span>💡</span> <span data-i18n="whatIs"></span></div>
      <div class="text" id="p-description"></div>
    </div>

    <div class="space-y-3">
      <div class="plan-section section-card" style="background: linear-gradient(180deg, #f0fdfa, #ccfbf1);">
        <div class="head">
          <div class="badge" style="background: var(--primary);">✓</div>
          <h3 class="text-[17px] font-extrabold text-teal-950" data-i18n="eat"></h3>
        </div>
        <div id="p-eat"></div>
      </div>

      <div class="plan-section section-card" style="background: linear-gradient(180deg, #fef2f2, #fee2e2);">
        <div class="head">
          <div class="badge" style="background: var(--danger);">✕</div>
          <h3 class="text-[17px] font-extrabold text-red-900" data-i18n="avoid"></h3>
        </div>
        <div id="p-avoid"></div>
      </div>

      <div class="plan-section section-card" style="background: linear-gradient(180deg, #fff7ed, #ffedd5);">
        <div class="head">
          <div class="badge" style="background: var(--accent);">🚶</div>
          <h3 class="text-[17px] font-extrabold text-orange-900" data-i18n="exercise"></h3>
        </div>
        <div id="p-exercise"></div>
      </div>

      <div class="plan-section section-card" style="background: linear-gradient(180deg, #f5f3ff, #ede9fe);">
        <div class="head">
          <div class="badge" style="background: var(--calm);">🧘</div>
          <h3 class="text-[17px] font-extrabold text-purple-900" data-i18n="meditation"></h3>
        </div>
        <div id="p-meditation"></div>
      </div>

      <div class="plan-section section-card" style="background: linear-gradient(180deg, #eff6ff, #dbeafe);">
        <div class="head">
          <div class="badge" style="background: var(--info);">💡</div>
          <h3 class="text-[17px] font-extrabold text-blue-900" data-i18n="lifestyle"></h3>
        </div>
        <div id="p-lifestyle"></div>
      </div>
    </div>

    <!-- NOSH7 promotional CTA -->

// ============================================================
// NOSH7 contact details
// ============================================================
const NOSH7 = {
  phone: '+919712989498',
  phoneDisplay: '+91 97129 89498',
  whatsapp: '919712989498'
};

// Language labels for the dropdown trigger
const LANG_LABELS = {
  hi: 'Hinglish',
  en: 'English',
  hn: 'हिंदी',
  gu: 'ગુજરાતી'
};

// ============================================================
// STATE
// ============================================================
let currentLang = 'hi';
let currentDisease = null;
let answers = { age: null, duration: null, activity: null };

function toggleLangMenu(e) {
  if (e) e.stopPropagation();
  document.getElementById('lang-menu').classList.toggle('open');
}
document.addEventListener('click', (e) => {
  const dd = document.querySelector('.lang-dropdown');
  if (dd && !dd.contains(e.target)) {
    document.getElementById('lang-menu').classList.remove('open');
  }
});

function setLang(lang) {
  currentLang = lang;
  document.body.classList.remove('lang-hi','lang-en','lang-hn','lang-gu');
  document.body.classList.add('lang-' + lang);
  document.documentElement.lang = lang === 'gu' ? 'gu' : (lang === 'hn' ? 'hi' : 'en');
  document.getElementById('lang-current').textContent = LANG_LABELS[lang];
  document.querySelectorAll('.lang-menu button').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
  document.getElementById('lang-menu').classList.remove('open');
  applyI18n();
  renderHome();
  if (!document.getElementById('screen-questions').hidden && currentDisease) renderQuestions();
  if (!document.getElementById('screen-plan').hidden && currentDisease) renderPlan();
  syncBottomBar();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[currentLang] && i18n[currentLang][key] !== undefined) {
      el.textContent = i18n[currentLang][key];
    }
  });
  document.getElementById('cta-call').href = 'tel:' + NOSH7.phone;
  document.getElementById('cta-wa').href = 'https://wa.me/' + NOSH7.whatsapp;
}

function showScreen(targetId) {
  const screens = ['screen-home','screen-questions','screen-plan'];
  const visible = screens.find(s => !document.getElementById(s).hidden);
  const target = document.getElementById(targetId);

  if (visible && visible !== targetId) {
    const prev = document.getElementById(visible);
    prev.classList.add('leaving');
    setTimeout(() => {
      prev.hidden = true;
      prev.classList.remove('leaving');
      target.classList.add('entering');
      target.hidden = false;
      requestAnimationFrame(() => { target.classList.remove('entering'); });
      window.scrollTo({ top: 0, behavior: 'instant' });
    }, 200);
  } else {
    target.hidden = false;
  }
}

function renderHome() {
  const grid = document.querySelector('#screen-home .grid');
  grid.innerHTML = '';
  Object.keys(diseases).forEach(key => {
    const d = diseases[key];
    const card = document.createElement('div');
    card.className = 'disease-card rounded-2xl p-4 border border-amber-100 shadow-sm flex flex-col items-center text-center';
    card.onclick = () => openDisease(key);
    card.innerHTML = `
      <div class="text-4xl sm:text-5xl mb-2">${d.icon}</div>
      <div class="font-bold text-teal-950 text-[14px] sm:text-[15px] leading-tight">${d.name[currentLang]}</div>
    `;
    grid.appendChild(card);
  });
}

function openDisease(key) {
  currentDisease = key;
  answers = { age: null, duration: null, activity: null };
  showScreen('screen-questions');
  renderQuestions();
  syncBottomBar();
}

function renderQuestions() {
  const d = diseases[currentDisease];
  document.getElementById('q-icon').textContent = d.icon;
  document.getElementById('q-disease').textContent = d.name[currentLang];
  buildPills('q-age', 'age', ['age1','age2','age3','age4'], 'wrap');
  buildPills('q-duration', 'duration', ['dur1','dur2','dur3'], 'wrap');
  buildPills('q-activity', 'activity', ['act1','act2','act3','act4'], 'col');
  applyI18n();
  updateStepBar();
}

function buildPills(containerId, field, keys, layout) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  if (layout === 'col') c.className = 'flex flex-col gap-2';
  else c.className = 'flex flex-wrap gap-2';
  keys.forEach((k, idx) => {
    const btn = document.createElement('button');
    const baseCls = layout === 'col'
      ? 'pill-btn border border-gray-300 rounded-xl px-4 py-3 text-[14px] bg-white text-left'
      : 'pill-btn border border-gray-300 rounded-full px-4 py-2 text-[14px] bg-white';
    btn.className = baseCls;
    btn.textContent = i18n[currentLang][k];
    if (answers[field] === idx + 1) btn.classList.add('active');
    btn.onclick = () => {
      const sibs = [...c.children];
      sibs.forEach(b => { if (b !== btn) b.classList.add('fade-out'); });
      setTimeout(() => {
        sibs.forEach(b => b.classList.remove('active','fade-out','fade-in-active'));
        btn.classList.add('active','fade-in-active');
        answers[field] = idx + 1;
        updateStepBar();
        syncBottomBar();
      }, 100);
    };
    c.appendChild(btn);
  });
}

function updateStepBar() {
  const bar = document.getElementById('step-bar');
  if (!bar) return;
  const done = [answers.age, answers.duration, answers.activity];
  bar.innerHTML = '';
  done.forEach((v, i) => {
    const seg = document.createElement('div');
    if (v) seg.className = 'done';
    else if (i === done.findIndex(x => !x)) seg.className = 'current';
    bar.appendChild(seg);
  });
}

function syncBottomBar() {
  const bar = document.getElementById('bottom-bar');
  const content = document.getElementById('bottom-content');
  const onHome = !document.getElementById('screen-home').hidden;
  const onQs = !document.getElementById('screen-questions').hidden;
  const onPlan = !document.getElementById('screen-plan').hidden;

  if (onHome) { bar.hidden = true; return; }
  bar.hidden = false;

  if (onQs) {
    const ready = answers.age && answers.duration && answers.activity;
    content.innerHTML = `
      <button id="generate-btn" ${ready ? '' : 'disabled'} onclick="goToPlan()" class="btn-primary">
        ${ready ? i18n[currentLang].generatePlan : i18n[currentLang].selPrompt}
      </button>
    `;
  } else if (onPlan) {
    content.innerHTML = `
      <div class="grid grid-cols-2 gap-2">
        <button onclick="goHome()" class="btn-secondary">${i18n[currentLang].seeAnother}</button>
        <button onclick="downloadCard()" class="btn-primary">📥 ${i18n[currentLang].downloadImage}</button>
      </div>
    `;
  }
}

function goToPlan() { showScreen('screen-plan'); renderPlan(); syncBottomBar(); }

function renderPlan() {
  const d = diseases[currentDisease];
  document.getElementById('p-icon').textContent = d.icon;
  document.getElementById('p-disease').textContent = d.name[currentLang];
  document.getElementById('p-description').textContent = d.description[currentLang];

  const notes = [];
  if (answers.age === 4) notes.push(i18n[currentLang].note45);
  if (answers.duration === 3) notes.push(i18n[currentLang].noteOld);
  if (answers.activity === 1) notes.push(i18n[currentLang].noteVeryLow);
  else if (answers.activity === 2) notes.push(i18n[currentLang].noteLow);
  const noteBox = document.getElementById('personal-note');
  if (notes.length) {
    noteBox.innerHTML = notes.map(n => `<div>⚠️ ${n}</div>`).join('');
    noteBox.hidden = false;
  } else {
    noteBox.hidden = true;
  }

  fillSection('p-eat', d.eat[currentLang], 'teal');
  fillSection('p-avoid', d.avoid[currentLang], 'red');
  fillSection('p-exercise', d.exercise[currentLang], 'orange');
  fillSection('p-meditation', d.meditation[currentLang], 'purple');
  fillSection('p-lifestyle', d.lifestyle[currentLang], 'blue');

  applyI18n();
}

function fillSection(id, items, color) {
  const c = document.getElementById(id);
  c.innerHTML = '';
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'item-row text-[14px] sm:text-[15px]';
    row.innerHTML = `<span class="num text-${color}-700">${i + 1}</span><span>${it}</span>`;
    c.appendChild(row);
  });
}

function goHome() {
  currentDisease = null;
  answers = { age: null, duration: null, activity: null };
  showScreen('screen-home');
  syncBottomBar();
}

async function downloadCard() {
  const d = diseases[currentDisease];
  const card = document.getElementById('share-card');
  card.classList.remove('lang-hi','lang-en','lang-hn','lang-gu');
  card.classList.add('lang-' + currentLang);

  document.getElementById('sc-brand-sub').textContent = i18n[currentLang].brandSub;
  document.getElementById('sc-callme').textContent = i18n[currentLang].scCallme;
  document.getElementById('sc-phone').textContent = NOSH7.phoneDisplay;
  document.getElementById('sc-icon').textContent = d.icon;
  document.getElementById('sc-disease').textContent = d.name[currentLang];
  document.getElementById('sc-personal').textContent = i18n[currentLang].shareSubtitle;
  document.getElementById('sc-disclaimer').textContent = i18n[currentLang].shareDisclaimer;
  document.getElementById('sc-whatis-label').textContent = i18n[currentLang].whatIs;
  document.getElementById('sc-whatis-text').textContent = d.description[currentLang];

  document.getElementById('sc-eat-h').textContent = i18n[currentLang].eat;
  document.getElementById('sc-avoid-h').textContent = i18n[currentLang].avoid;
  document.getElementById('sc-ex-h').textContent = i18n[currentLang].exercise;
  document.getElementById('sc-med-h').textContent = i18n[currentLang].meditation;
  document.getElementById('sc-life-h').textContent = i18n[currentLang].lifestyle;
  document.getElementById('sc-cta-title').textContent = i18n[currentLang].scCtaTitle;
  document.getElementById('sc-cta-body').textContent = i18n[currentLang].scCtaBody;

  fillUL('sc-eat', d.eat[currentLang]);
  fillUL('sc-avoid', d.avoid[currentLang]);
  fillUL('sc-ex', d.exercise[currentLang]);
  fillUL('sc-med', d.meditation[currentLang]);
  fillUL('sc-life', d.lifestyle[currentLang]);

  if (document.fonts && document.fonts.ready) await document.fonts.ready;

  const canvas = await html2canvas(card, { scale: 1, backgroundColor: '#ffffff', useCORS: true, logging: false });
  const link = document.createElement('a');
  link.download = `nosh7-${currentDisease}-${currentLang}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function fillUL(id, items) {
  const ul = document.getElementById(id);
  ul.innerHTML = '';
  items.forEach(it => {
    const li = document.createElement('li');
    li.textContent = it;
    ul.appendChild(li);
  });
}

// INIT
applyI18n();
renderHome();
syncBottomBar();
document.querySelector('.lang-menu button[data-lang="hi"]').classList.add('active');
</script>
