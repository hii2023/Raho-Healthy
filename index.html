    --danger-light: #fee2e2;

    --info-light: #dbeafe;
    --text: #1f2937;
    --muted: #6b7280;
  }

    background: var(--warm-bg);
    color: var(--text);

  }
  body.lang-gu, body.lang-gu * {
    font-family: 'Noto Sans Gujarati', sans-serif !important;
  }
  .disease-card {
    transition: transform 0.2s, box-shadow 0.2s;

  }
  .disease-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }
  .pill-btn {
    transition: all 0.15s;
    cursor: pointer;
  }
  .pill-btn:hover { background: #f3f4f6; }
  .pill-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .section-card {
    border-radius: 16px;
    padding: 1.25rem;
  }

    align-items: flex-start;

    padding: 0.5rem 0;

    line-height: 1.5;
  }

  .icon-circle {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    margin-top: 2px;
  }
  .lang-toggle button.active {
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    color: var(--primary);
    font-weight: 600;
  }
  /* image card hidden offscreen for html2canvas */

    position: fixed;
    left: -9999px;
    top: 0;
    width: 1080px;
    background: white;
    padding: 60px;
    font-family: 'Poppins', sans-serif;
  }
  #share-card.lang-gu, #share-card.lang-gu * {

  .share-section li { font-size: 24px; line-height: 1.5; padding: 6px 0; list-style: none; padding-left: 28px; position: relative; }
  .share-section li::before { content: '•'; position: absolute; left: 8px; font-weight: bold; }

  </section>

</main>

// ============================================================
// STATE
// ============================================================
let currentLang = 'hi';
let currentDisease = null;
let answers = { age: null, duration: null, activity: null };

// ============================================================
// LANGUAGE
// ============================================================
function setLang(lang) {
  currentLang = lang;
  document.body.classList.remove('lang-hi', 'lang-gu');
  document.body.classList.add('lang-' + lang);
  document.documentElement.lang = lang === 'gu' ? 'gu' : 'en';

  // toggle buttons
  document.querySelectorAll('.lang-toggle button').forEach((b, i) => {
    b.classList.toggle('active', (lang === 'hi' && i === 0) || (lang === 'gu' && i === 1));
  });

  applyI18n();
  renderHome();
  // re-render whichever screen is visible
  if (!document.getElementById('screen-questions').hidden && currentDisease) showQuestions(currentDisease);
  if (!document.getElementById('screen-plan').hidden && currentDisease) showPlan();
}

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (i18n[currentLang][key]) el.textContent = i18n[currentLang][key];
  });
}

// ============================================================
// HOME SCREEN - render disease cards
// ============================================================
function renderHome() {
  const grid = document.querySelector('#screen-home .grid');
  grid.innerHTML = '';
  Object.keys(diseases).forEach(key => {
    const d = diseases[key];
    const card = document.createElement('div');
    card.className = 'disease-card bg-white rounded-2xl p-4 md:p-5 border border-amber-100 shadow-sm flex flex-col items-center text-center';
    card.onclick = () => showQuestions(key);
    card.innerHTML = `
      <div class="text-4xl md:text-5xl mb-2">${d.icon}</div>
      <div class="font-semibold text-emerald-900 text-sm md:text-base leading-tight">${d.name[currentLang]}</div>
    `;
    grid.appendChild(card);
  });
}

// ============================================================
// QUESTIONS SCREEN
// ============================================================
function showQuestions(diseaseKey) {
  currentDisease = diseaseKey;
  answers = { age: null, duration: null, activity: null };

  document.getElementById('screen-home').hidden = true;
  document.getElementById('screen-questions').hidden = false;
  document.getElementById('screen-plan').hidden = true;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const d = diseases[diseaseKey];
  document.getElementById('q-icon').textContent = d.icon;
  document.getElementById('q-disease').textContent = d.name[currentLang];

  buildPills('q-age', 'age', ['age1', 'age2', 'age3']);
  buildPills('q-duration', 'duration', ['dur1', 'dur2', 'dur3']);
  buildPills('q-activity', 'activity', ['act1', 'act2', 'act3']);
  applyI18n();
  updateGenerateBtn();
}

function buildPills(containerId, field, keys) {
  const c = document.getElementById(containerId);
  c.innerHTML = '';
  keys.forEach((k, idx) => {
    const btn = document.createElement('button');
    btn.className = 'pill-btn border border-gray-300 rounded-full px-4 py-2 text-sm bg-white';
    btn.textContent = i18n[currentLang][k];
    btn.onclick = () => {
      answers[field] = idx + 1;
      [...c.children].forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      updateGenerateBtn();
    };
    c.appendChild(btn);
  });
}

function updateGenerateBtn() {
  const ready = answers.age && answers.duration && answers.activity;
  document.getElementById('generate-btn').disabled = !ready;
}

// ============================================================
// PLAN SCREEN
// ============================================================
function showPlan() {
  document.getElementById('screen-home').hidden = true;
  document.getElementById('screen-questions').hidden = true;
  document.getElementById('screen-plan').hidden = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  const d = diseases[currentDisease];
  document.getElementById('p-icon').textContent = d.icon;
  document.getElementById('p-disease').textContent = d.name[currentLang];

  // personal note logic
  const notes = [];
  if (answers.age === 3) notes.push(i18n[currentLang].note55);
  if (answers.duration === 3) notes.push(i18n[currentLang].noteOld);
  if (answers.activity === 1) notes.push(i18n[currentLang].noteLow);

  const noteBox = document.getElementById('personal-note');
  if (notes.length) {
    noteBox.innerHTML = notes.map(n => `<div class="mb-1">⚠️ ${n}</div>`).join('');
    noteBox.hidden = false;
  } else {
    noteBox.hidden = true;
  }

  fillSection('p-eat', d.eat[currentLang], 'green');
  fillSection('p-avoid', d.avoid[currentLang], 'red');
  fillSection('p-yoga', d.yoga[currentLang], 'orange');
  fillSection('p-lifestyle', d.lifestyle[currentLang], 'blue');

  applyI18n();
}

function fillSection(id, items, color) {
  const c = document.getElementById(id);
  c.innerHTML = '';
  items.forEach((it, i) => {
    const row = document.createElement('div');
    row.className = 'item-row text-sm md:text-base';
    row.innerHTML = `<span class="icon-circle bg-white text-${color}-700 font-bold">${i + 1}</span><span>${it}</span>`;
    c.appendChild(row);
  });
}

function goHome() {
  document.getElementById('screen-home').hidden = false;
  document.getElementById('screen-questions').hidden = true;
  document.getElementById('screen-plan').hidden = true;
  currentDisease = null;
  answers = { age: null, duration: null, activity: null };
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
// IMAGE DOWNLOAD
// ============================================================
async function downloadCard() {
  const d = diseases[currentDisease];
  const card = document.getElementById('share-card');
  card.classList.remove('lang-hi', 'lang-gu');
  card.classList.add('lang-' + currentLang);

  document.getElementById('sc-brand').textContent = i18n[currentLang].brandTitle;
  document.getElementById('sc-brand-sub').textContent = i18n[currentLang].brandSub;
  document.getElementById('sc-icon').textContent = d.icon;
  document.getElementById('sc-disease').textContent = d.name[currentLang];
  document.getElementById('sc-personal').textContent = i18n[currentLang].shareSubtitle;
  document.getElementById('sc-disclaimer').textContent = i18n[currentLang].shareDisclaimer;

  document.getElementById('sc-eat-h').textContent = i18n[currentLang].eat;
  document.getElementById('sc-avoid-h').textContent = i18n[currentLang].avoid;
  document.getElementById('sc-yoga-h').textContent = i18n[currentLang].yoga;
  document.getElementById('sc-life-h').textContent = i18n[currentLang].lifestyle;

  fillUL('sc-eat', d.eat[currentLang]);
  fillUL('sc-avoid', d.avoid[currentLang]);
  fillUL('sc-yoga', d.yoga[currentLang]);
  fillUL('sc-life', d.lifestyle[currentLang]);

  // wait for fonts to be ready
  if (document.fonts && document.fonts.ready) await document.fonts.ready;

  const canvas = await html2canvas(card, {
    scale: 1,
    backgroundColor: '#ffffff',
    useCORS: true,
    logging: false
  });

  const link = document.createElement('a');
  link.download = `nosh7-${currentDisease}-${currentLang}-plan.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function fillUL(id, items) {
  const ul = document.getElementById(id);
  ul.innerHTML = '';
  items.forEach(it => {
    const li = document.createElement('li');
    li.textContent = it;
    ul.appendChild(li);
  });
}

// ============================================================
// INIT
// ============================================================
applyI18n();
renderHome();
</script>
